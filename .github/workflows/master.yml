on:
  push:
    branches:
      - main
name:
  Deploy on weddingeventwala
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v6

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: 147.93.96.25
          username: weddingeventwala-ftp
          password: ${{ secrets.password }}
